<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>InspireHub Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body onload="initDashboard()">

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>INSPIREHUB</h2>

    <a href="index.html">🏠 Home</a>
    <a href="#videoFeed">🎥 Videos</a>
    <a href="#progress">🔥 Progress</a>
    <a href="#achievements">🏆 Achievements</a>
    <a href="#" onclick="logout()">🚪 Logout</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="brand" id="welcomeText">Welcome</div>
      <div class="streak" id="streakText">🔥 Streak: 1</div>
    </div>

    <!-- HERO -->
    <div class="hero">
      <h1>Your Learning Dashboard</h1>
      <p>Watch • Learn • Grow</p>
    </div>

    <!-- MOTIVATION -->
    <div class="card">
      <h3>Daily Motivation</h3>
      <p id="dailyMotivation">Loading...</p>
    </div>

    <!-- VIDEOS -->
    <div class="card">
      <h3>Recommended Videos</h3>
      <div id="videoFeed"></div>
    </div>

    <!-- PROGRESS -->
    <div class="card" id="progress">
      <h3>Progress</h3>
      <p id="progressText">Loading...</p>
    </div>

    <!-- CHATBOT -->
    <div class="card chatbot">
      <h3>💬 InspireBot</h3>

      <div id="chatBox" class="chat-box"></div>

      <input id="chatInput" placeholder="Ask for motivation...">
      <button class="btn" onclick="sendMessage()">Send</button>
    </div>

  </div>
</div>

<!-- IMPORTANT ORDER -->
<script src="js/speakers.js"></script>
<script src="js/app.js"></script>

</body>
</html>
